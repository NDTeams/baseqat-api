<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة المرور | باسقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }

        .bg-pattern {
            background: linear-gradient(135deg, rgba(12, 30, 24, 0.95) 0%, rgba(20, 55, 45, 0.9) 100%), #0f241c;
            position: relative;
            overflow: hidden;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.1;
            background-image: repeating-linear-gradient(to right, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px), repeating-linear-gradient(to bottom, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px);
        }

        .loader {
            border-top-color: #ffffff;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="fixed inset-0 bg-pattern -z-10">
        <div class="grid-overlay"></div>
    </div>

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">

        <div class="bg-emerald-700 p-8 text-center">
            <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm border border-white/20">
                <i class="fa-solid fa-lock-open text-3xl text-white"></i>
            </div>
            <h1 class="text-xl font-black text-white">تعيين كلمة مرور جديدة</h1>
        </div>

        <form id="resetPasswordForm" class="p-8 space-y-5">
            <input type="hidden" id="emailInput">
            <input type="hidden" id="tokenInput">

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 mr-1">كلمة المرور الجديدة</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" id="newPassword" required placeholder="••••••••"
                           class="w-full pr-11 pl-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-700 focus:border-emerald-700 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 mr-1">تأكيد كلمة المرور</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400">
                        <i class="fa-solid fa-shield-check"></i>
                    </span>
                    <input type="password" id="confirmPassword" required placeholder="••••••••"
                           class="w-full pr-11 pl-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-700 focus:border-emerald-700 outline-none transition-all">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-700/20 transition-all active:scale-95 mt-4 flex items-center justify-center">
                <span id="btnText">تحديث كلمة المرور</span>
                <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 loader rounded-full"></div>
            </button>
        </form>

        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-xs text-slate-400">
                تذكرت كلمة المرور؟ <a href="/login.html" class="text-emerald-700 font-bold">تسجيل الدخول</a>
            </p>
        </div>
    </div>

    <script>
        // 1. جلب البيانات من الرابط (URL) عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const token = urlParams.get('token');

            if (email && token) {
                document.getElementById('emailInput').value = email;
                document.getElementById('tokenInput').value = token;
            } else {
                // إذا كانت البيانات ناقصة نوجهه لصفحة الخطأ مباشرة
                window.location.href = "/ResetPasswordError.html";
            }
        });

        // 2. معالجة الإرسال للـ API
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass !== confirmPass) {
                alert("كلمات المرور غير متطابقة!");
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            // حالة التحميل
            submitBtn.disabled = true;
            btnText.textContent = "جارٍ الحفظ...";
            btnLoader.classList.remove('hidden');

            const data = {
                email: document.getElementById('emailInput').value,
                token: document.getElementById('tokenInput').value,
                newPassword: newPass,
                confirmPassword: confirmPass
            };

            try {
                const response = await fetch('/api/Account/ResetPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.succeeded) {
                    window.location.href = "/ResetPasswordSuccess.html";
                } else {
                    window.location.href = "/ResetPasswordFailed.html";
                }
            } catch (error) {
                console.error("Error:", error);
                window.location.href = "/ResetPasswordFailed.html";
            }
        });
    </script>

</body>
</html>

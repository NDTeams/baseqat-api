<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فشل التحقق | باسقات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-pattern {
      background: linear-gradient(135deg, rgba(12, 30, 24, 0.95) 0%, rgba(20, 55, 45, 0.9) 100%), #0f241c;
      position: relative;
      overflow: hidden;
    }
    .grid-overlay {
      position: absolute; inset: 0; opacity: 0.1;
      background-image: 
        repeating-linear-gradient(to right, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(to bottom, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px);
    }
    .error-shake {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="fixed inset-0 bg-pattern -z-10">
    <div class="grid-overlay"></div>
  </div>

  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-red-100">
    
    <div class="bg-red-500 p-10 text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 w-24 h-24 bg-white/10 rounded-full -mr-10 -mt-10"></div>
        
        <div class="error-shake w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto shadow-xl">
            <i class="fa-solid fa-xmark text-5xl text-red-500"></i>
        </div>
    </div>

    <div class="p-8 text-center space-y-6">
      <div class="space-y-2">
        <h1 class="text-2xl font-black text-slate-800">عذراً! انتهت صلاحية الرابط</h1>
        <p class="text-red-600 font-bold">لم نتمكن من التحقق من بريدك</p>
      </div>

      <p class="text-slate-500 leading-relaxed text-sm">
        يبدو أن رابط التحقق الذي استخدمته قد انتهت صلاحيته أو تم استخدامه مسبقاً. يرجى طلب رابط جديد للمتابعة.
      </p>

      <div class="space-y-3 pt-4">
        <button class="block w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-700/20 transition-all active:scale-95 flex items-center justify-center gap-2">
          <i class="fa-solid fa-paper-plane text-sm"></i>
          إرسال رابط جديد
        </button>
        
        <a href="index-hero.html" class="block w-full text-slate-400 hover:text-slate-600 font-semibold text-sm transition-colors py-2">
          العودة للرئيسية
        </a>
      </div>
    </div>

    <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
        <p class="text-xs text-slate-400">
            تواجه مشكلة؟ <a href="#" class="text-emerald-700 font-bold underline">تواصل مع الدعم الفني</a>
        </p>
    </div>
  </div>

</body>
</html>

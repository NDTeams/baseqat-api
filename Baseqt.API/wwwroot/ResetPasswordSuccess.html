<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم التغيير بنجاح | باسقات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-pattern {
      background: linear-gradient(135deg, rgba(12, 30, 24, 0.95) 0%, rgba(20, 55, 45, 0.9) 100%), #0f241c;
      position: relative; overflow: hidden;
    }
    .grid-overlay {
      position: absolute; inset: 0; opacity: 0.1;
      background-image: 
        repeating-linear-gradient(to right, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(to bottom, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px);
    }
    /* أنيميشن احتفالي بسيط لعلامة الصح */
    .success-pop {
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="fixed inset-0 bg-pattern -z-10">
    <div class="grid-overlay"></div>
  </div>

  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-emerald-50">
    
    <div class="bg-emerald-700 p-12 text-center relative">
      <div class="success-pop w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto shadow-2xl shadow-emerald-900/50">
        <i class="fa-solid fa-check text-5xl text-emerald-700"></i>
      </div>
      <div class="absolute top-4 left-4 w-12 h-12 bg-white/5 rounded-full"></div>
      <div class="absolute bottom-10 right-10 w-8 h-8 bg-white/5 rounded-full"></div>
    </div>

    <div class="p-10 text-center space-y-6">
      <div class="space-y-2">
        <h1 class="text-3xl font-black text-slate-800">تم التحديث!</h1>
        <p class="text-emerald-700 font-bold">كلمة المرور الجديدة جاهزة للاستخدام</p>
      </div>

      <p class="text-slate-500 leading-relaxed">
        لقد تم تغيير كلمة مرور حسابك بنجاح. يمكنك الآن تسجيل الدخول باستخدام بياناتك الجديدة للوصول إلى لوحة التحكم الخاصة بك في <span class="font-bold">باسقات</span>.
      </p>

      <div class="pt-6">
        <a href="/login" class="block w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-700/30 transition-all hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3">
          <span>تسجيل الدخول الآن</span>
          <i class="fa-solid fa-right-to-bracket"></i>
        </a>
      </div>
    </div>

    <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
      <p class="text-[11px] text-slate-400 font-semibold uppercase tracking-widest">
        Security System Verified
      </p>
    </div>
  </div>

  <div class="mt-8 text-white/50 text-sm flex gap-4">
    <span>نظام باسقات الآمن</span>
    <span>•</span>
    <span>2026</span>
  </div>

</body>
</html>

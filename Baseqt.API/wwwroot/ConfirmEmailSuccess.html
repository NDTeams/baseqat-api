<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم التأكيد بنجاح | باسقات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .bg-pattern {
      background: linear-gradient(135deg, rgba(12, 30, 24, 0.95) 0%, rgba(20, 55, 45, 0.9) 100%), #0f241c;
      position: relative;
      overflow: hidden;
    }
    .grid-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.1;
      background-image: 
        repeating-linear-gradient(to right, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(to bottom, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px);
    }
    /* أنيميشن بسيط لعلامة الصح */
    .success-check {
      animation: scaleUp 0.5s ease-out forwards;
    }
    @keyframes scaleUp {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="fixed inset-0 bg-pattern -z-10">
    <div class="grid-overlay"></div>
  </div>

  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
    
    <div class="bg-emerald-700 p-10 text-center">
      <div class="success-check w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto shadow-xl shadow-black/20">
        <i class="fa-solid fa-check text-5xl text-emerald-700"></i>
      </div>
    </div>

    <div class="p-8 text-center space-y-6">
      <div class="space-y-2">
        <h1 class="text-3xl font-black text-slate-800">رائع! تم التأكيد</h1>
        <p class="text-emerald-700 font-bold">تم تفعيل بريدك الإلكتروني بنجاح</p>
      </div>

      <p class="text-slate-500 leading-relaxed">
        شكراً لانضمامك إلينا. يمكنك الآن الوصول إلى كافة ميزات منصة <span class="font-bold">باسقات</span> والبدء في إدارة أعمالك.
      </p>

      <div class="pt-6">
        <a href="index-hero.html" class="block w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-700/20 transition-all transform active:scale-95 flex items-center justify-center gap-3">
          <span>اذهب إلى لوحة التحكم</span>
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </div>
    </div>

    <div class="h-2 bg-emerald-700/10">
      <div class="h-full bg-emerald-700 w-full"></div>
    </div>
  </div>

  <div class="mt-8 flex gap-6 text-white/60 text-sm">
    <a href="#" class="hover:text-white transition-colors">الدعم الفني</a>
    <span>•</span>
    <a href="#" class="hover:text-white transition-colors">الشروط والأحكام</a>
  </div>

</body>
</html>
